<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Map of Level-0</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="map-app">
      <div class="map-surface" id="mapSurface" aria-label="Backrooms map canvas">
        <div class="map-world" id="mapWorld" aria-hidden="true">
          <div class="axis-overlay" aria-hidden="true">
            <div class="axis-line axis-line--vertical"></div>
            <div class="axis-line axis-line--horizontal"></div>

            <div class="world-border-line border-line--left" style="position: absolute; display: none;"></div>
            <div class="world-border-line border-line--right" style="position: absolute; display: none;"></div>
            <div class="world-border-line border-line--top" style="position: absolute; display: none;"></div>
            <div class="world-border-line border-line--bottom" style="position: absolute; display: none;"></div>
          </div>

          <div class="walls-layer"></div>

          <div class="labels-layer" aria-hidden="true">
            <div class="map-boundary-box" style="position: absolute; display: none;">
              <div class="map-boundary-label top-left" style="position: absolute; top: 8px; left: 12px;">Walkable Space (2.1M)</div>
              <div class="map-boundary-label bottom-right" style="position: absolute; bottom: 8px; right: 12px;">Walkable Space (2.1M)</div>
            </div>
          </div>

          <div class="points-layer"></div>
        </div>

        <div class="coord-readout" aria-label="Current coordinates">
          <span>Level-0</span>
          <strong data-coordinate>X 0, Z 0</strong>
        </div>

        <div class="zoom-controls" aria-label="Map zoom controls">
          <span class="zoom-level" data-zoom-label>100%</span>
        </div>
      </div>
    </div>

    <script src="map-handler.js"></script>
    <script src="map-overlay.js"></script>
  </body>
</html>
